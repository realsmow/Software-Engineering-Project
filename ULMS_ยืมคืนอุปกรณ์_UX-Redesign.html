<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ULMs — ยืมง่าย คืนไว (UX Redesign)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ULMs — UX Redesign (Borrower-first / Mobile-first)
   แนวคิดหลัก:
   1. ผู้ยืมใช้มือถือ (ต้องถ่ายรูปรับ-คืน) => หน้าจอผู้ยืมเป็น mobile app
   2. Staff / อาจารย์ / Admin ทำงานหน้าจอใหญ่ => desktop console
   3. เรื่องเครดิต/แต้ม ซ่อนไว้ในโปรไฟล์ ไม่โผล่มากดดันใน flow ยืม-คืน
   ============================================================ */
:root{
  --bg:#f3f5f2; --card:#ffffff; --line:#e3e8e2; --ink:#1c2b23; --mut:#6b7d72;
  --pri:#0e7a46; --pri-2:#0a5c36; --pri-soft:#e3f2e9;
  --amber:#92400e; --amber-soft:#fdf1df;
  --red:#b91c1c;  --red-soft:#fdeaea;
  --blue:#1e40af; --blue-soft:#e8effd;
  --r:18px;
  --sh:0 1px 2px rgba(16,42,28,.05), 0 10px 28px -14px rgba(16,42,28,.18);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Sarabun',system-ui,sans-serif;background:#e7ebe6;color:var(--ink);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.55}
button{font-family:inherit}
svg{flex-shrink:0}

/* ---------- Phone shell (ผู้ยืม) ---------- */
.stage{min-height:100dvh;background:
  radial-gradient(1200px 500px at 80% -10%, #dcebe0 0%, transparent 60%),
  linear-gradient(165deg,#eef2ed,#e2e8e1)}
.phone{position:relative;margin:0 auto;width:min(444px,100vw);min-height:100dvh;background:var(--bg);box-shadow:0 0 70px rgba(20,45,30,.16)}
.page{padding:16px 18px 116px;animation:fade .25s ease-out}
.appbar{position:sticky;top:0;z-index:30;background:rgba(243,245,242,.92);backdrop-filter:blur(10px);padding:14px 18px 10px;display:flex;align-items:center;gap:10px}
.appbar .grow{flex:1}
.h1{font-size:22px;font-weight:800;letter-spacing:-.01em;margin:0}
.h2{font-size:16.5px;font-weight:800;margin:0}
.h3{font-size:14.5px;font-weight:800;margin:0}
.sub{font-size:13px;color:var(--mut)}
.tiny{font-size:11.5px;color:var(--mut)}
.sec{margin-top:22px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.link{color:var(--pri);font-weight:700;font-size:13px;cursor:pointer;background:none;border:0;padding:0}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;border-radius:14px;padding:13px 18px;border:0;cursor:pointer;font-size:15px;transition:transform .12s, filter .15s;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--pri);color:#fff}
.btn-pri:hover{filter:brightness(1.06)}
.btn-soft{background:var(--pri-soft);color:var(--pri-2)}
.btn-line{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.btn-ghost{background:transparent;color:var(--mut)}
.btn-danger{background:var(--red-soft);color:var(--red)}
.btn-block{width:100%}
.btn-sm{padding:8px 13px;font-size:13px;border-radius:11px;font-weight:700}
.iconbtn{width:42px;height:42px;border-radius:14px;border:1.5px solid var(--line);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);position:relative}
.iconbtn .dot{position:absolute;top:9px;right:9px;width:8px;height:8px;border-radius:50%;background:#e11d48;border:2px solid #fff}

/* ---------- Cards & chips ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.pad{padding:16px}
.row{display:flex;align-items:center;gap:12px}
.vgap{display:flex;flex-direction:column;gap:10px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:3.5px 9px;border-radius:99px;white-space:nowrap}
.b-green{background:var(--pri-soft);color:var(--pri-2)}
.b-amber{background:var(--amber-soft);color:var(--amber)}
.b-red{background:var(--red-soft);color:var(--red)}
.b-blue{background:var(--blue-soft);color:var(--blue)}
.b-gray{background:#edf0ec;color:#5c6b62}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.chiprow::-webkit-scrollbar{display:none}
.chip{padding:8px 15px;border-radius:99px;background:#fff;border:1.5px solid var(--line);font-size:13px;font-weight:700;color:var(--mut);white-space:nowrap;cursor:pointer}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* ---------- Search ---------- */
.searchbox{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:12px 15px;color:var(--mut);cursor:text}
.searchbox input{flex:1;border:0;outline:0;font:inherit;background:none;color:var(--ink)}

/* ---------- Home: todo scroll ---------- */
.todo-scroll{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 6px;scrollbar-width:none}
.todo-scroll::-webkit-scrollbar{display:none}
.todo-card{min-width:250px;max-width:270px;flex-shrink:0}

/* ---------- Item cards ---------- */
.itemcard{display:flex;gap:13px;padding:14px;border-radius:var(--r);background:#fff;border:1px solid var(--line);cursor:pointer;box-shadow:var(--sh)}
.thumb{width:56px;height:56px;border-radius:15px;background:var(--pri-soft);display:flex;align-items:center;justify-content:center;color:var(--pri);flex-shrink:0}
.thumb.big{width:72px;height:72px;border-radius:18px}
.thumb.gray{background:#eef1ee;color:var(--mut)}

/* ---------- Tab bar ---------- */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(444px,100vw);background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 9px;color:#93a29a;font-size:10.5px;font-weight:800;background:none;border:0;cursor:pointer;position:relative}
.tab.on{color:var(--pri)}
.tab .cartn{position:absolute;top:5px;right:calc(50% - 22px);background:#e11d48;color:#fff;font-size:10px;min-width:17px;height:17px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ---------- Sheets / modals ---------- */
.sheet-wrap{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;background:rgba(15,30,22,.48);backdrop-filter:blur(3px);animation:fade .2s}
.sheet{width:min(444px,100vw);max-height:92dvh;overflow-y:auto;background:#fff;border-radius:24px 24px 0 0;padding:10px 20px 26px;animation:rise .24s ease-out}
.sheet .grab{width:44px;height:5px;border-radius:99px;background:#dfe4de;margin:4px auto 14px}
/* จอคอม (body.dt): sheet กลายเป็น modal กลางจอ */
body.dt .sheet-wrap{align-items:center;padding:24px}
body.dt .sheet{border-radius:24px;max-height:86vh}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.xbtn{width:34px;height:34px;border-radius:50%;background:#f0f3ef;border:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mut)}

/* ---------- Forms ---------- */
.field{margin-bottom:14px}
.label{font-size:12.5px;font-weight:800;color:var(--mut);margin-bottom:6px;display:block}
.input,select.input,textarea.input{width:100%;padding:12px 14px;border-radius:14px;border:1.5px solid var(--line);font:inherit;background:#fff;color:var(--ink);outline-color:var(--pri)}
textarea.input{resize:vertical;min-height:84px}
.qty{display:flex;align-items:center;gap:16px}
.qty button{width:38px;height:38px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-size:18px;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center}
.qty b{font-size:18px;min-width:24px;text-align:center}
.kv{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:5.5px 0}
.kv b{text-align:right}
.hr{border:0;border-top:1px solid var(--line);margin:12px 0}

/* ---------- Serial picker / slots ---------- */
.serial{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--line);border-radius:15px;cursor:pointer;background:#fff}
.serial.on{border-color:var(--pri);background:var(--pri-soft)}
.serial.off{opacity:.45;pointer-events:none}
.slotgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.slot{padding:10px 4px;border-radius:12px;border:1.5px solid var(--line);background:#fff;text-align:center;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--ink)}
.slot.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.slot.off{opacity:.35;text-decoration:line-through;pointer-events:none}

/* ---------- Stepper (สถานะรายการยืม) ---------- */
.stepper{display:flex;margin:14px 0 4px}
.stp{flex:1;text-align:center;position:relative;font-size:9.5px;color:#9aa8a0;font-weight:800}
.stp:not(:first-child)::before{content:'';position:absolute;top:9px;left:-50%;width:100%;height:2.5px;background:#e4e9e3}
.stp.done:not(:first-child)::before{background:var(--pri)}
.stp .d{width:19px;height:19px;margin:0 auto 5px;border-radius:50%;background:#fff;border:2.5px solid #dde3dd;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;color:#fff}
.stp.done{color:var(--pri-2)}
.stp.done .d{background:var(--pri);border-color:var(--pri)}
.stp.cur{color:var(--ink)}
.stp.cur .d{border-color:var(--pri);box-shadow:0 0 0 4px var(--pri-soft)}

/* ---------- Segmented control ---------- */
.seg{display:flex;background:#e8ece7;border-radius:13px;padding:3.5px;gap:3px}
.seg button{flex:1;border:0;background:none;padding:9px 4px;border-radius:10px;font-weight:800;font-size:13px;color:var(--mut);cursor:pointer}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(16,42,28,.12)}

/* ---------- Photo capture tile ---------- */
.photo{border:2px dashed #ccd5cd;border-radius:16px;padding:20px 14px;text-align:center;color:var(--mut);cursor:pointer;background:#fbfcfb;transition:.15s}
.photo.done{border-style:solid;border-color:var(--pri);background:var(--pri-soft);color:var(--pri-2)}
.photo-cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.photo-cmp .ph{border-radius:14px;background:#eef1ee;border:1px solid var(--line);padding:22px 8px;text-align:center;color:var(--mut);font-size:12px}

/* ---------- Notices ---------- */
.notice{display:flex;gap:10px;padding:12px 14px;border-radius:14px;font-size:13px;line-height:1.55;align-items:flex-start}
.notice.info{background:var(--blue-soft);color:#1e3a8a}
.notice.warn{background:var(--amber-soft);color:var(--amber)}
.notice.good{background:var(--pri-soft);color:var(--pri-2)}

/* ---------- Profile ---------- */
.avatar{width:54px;height:54px;border-radius:50%;background:linear-gradient(140deg,var(--pri),#0a4e30);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:21px}
.creditbar{height:8px;border-radius:99px;background:#e7ebe6;overflow:hidden}
.creditbar i{display:block;height:100%;background:var(--pri);border-radius:99px}
details.acc{border:1px solid var(--line);border-radius:16px;background:#fff;padding:0 16px;box-shadow:var(--sh)}
details.acc summary{list-style:none;cursor:pointer;padding:15px 0;font-weight:800;font-size:14.5px;display:flex;justify-content:space-between;align-items:center;gap:10px}
details.acc summary::-webkit-details-marker{display:none}
details.acc[open] summary{border-bottom:1px solid var(--line)}
details.acc .acc-body{padding:13px 0 16px}
.logrow{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:8px 0;border-bottom:1px dashed #e8ece7}
.logrow:last-child{border:0}
.switch{width:42px;height:24px;border-radius:99px;background:#d6ddd6;position:relative;cursor:pointer;border:0;transition:.15s;flex-shrink:0}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.switch.on{background:var(--pri)}
.switch.on::after{left:21px}

/* ---------- Login ---------- */
.login{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:
  radial-gradient(900px 480px at 15% -5%, rgba(255,255,255,.14), transparent 55%),
  radial-gradient(700px 500px at 110% 110%, rgba(255,255,255,.1), transparent 55%),
  linear-gradient(155deg,#0b5c35,#0e7a46 55%,#0a4e30);padding:24px}
.login-card{width:min(400px,100%);background:#fff;border-radius:26px;padding:34px 30px;box-shadow:0 30px 70px -20px rgba(0,30,15,.5);text-align:center;animation:rise .3s ease-out}
.logo-mark{width:74px;height:74px;border-radius:22px;background:var(--pri-soft);color:var(--pri);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}

/* ---------- Console (staff / supervisor / admin) ---------- */
.cshell{min-height:100vh;background:var(--bg)}
.ctop{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.ctop-in{max-width:1160px;margin:0 auto;padding:0 22px;display:flex;align-items:center;gap:16px;height:62px}
.clogo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px}
.clogo .m{width:34px;height:34px;border-radius:11px;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center}
.ctabs{display:flex;gap:4px;flex:1}
.ctab{padding:9px 16px;border-radius:12px;font-weight:700;font-size:14px;color:var(--mut);cursor:pointer;border:0;background:none;display:flex;align-items:center;gap:7px}
.ctab.on{background:var(--pri-soft);color:var(--pri-2)}
.ctab .n{background:#e11d48;color:#fff;font-size:10.5px;min-width:17px;height:17px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}
.cbody{max-width:1160px;margin:0 auto;padding:22px;display:flex;flex-direction:column;gap:16px;animation:fade .25s}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
body.mb .grid4,body.mb .grid3{grid-template-columns:1fr 1fr}
body.mb .grid2{grid-template-columns:1fr}
.stat .n{font-size:27px;font-weight:800;line-height:1.15}
.table{width:100%;border-collapse:collapse;font-size:13.5px}
.table th{text-align:left;font-size:12px;color:var(--mut);padding:10px 12px;border-bottom:1.5px solid var(--line);font-weight:800;white-space:nowrap}
.table td{padding:11px 12px;border-bottom:1px solid #eef1ee;vertical-align:middle}
.bar{display:flex;align-items:center;gap:10px;font-size:12.5px}
.bar .tk{width:52px;color:var(--mut);font-weight:700;text-align:right}
.bar i{height:11px;border-radius:99px;background:var(--pri);display:block}

/* ---------- Toast / demo bars ---------- */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#14231b;color:#fff;padding:12px 18px;border-radius:14px;font-size:13.5px;font-weight:600;z-index:99;box-shadow:0 14px 40px rgba(0,0,0,.35);display:flex;gap:9px;align-items:center;animation:rise .22s;max-width:min(400px,90vw)}
.rolebar{position:fixed;left:14px;bottom:14px;z-index:80;background:#101c15;color:#fff;border-radius:16px;padding:10px 12px;font-size:11.5px;box-shadow:0 12px 32px rgba(0,0,0,.35);display:flex;flex-direction:column;gap:7px}
.rb-row{display:flex;align-items:center;gap:5px}
.rb-row>span{opacity:.55;font-weight:700;min-width:46px}
.rolebar button{border:0;background:rgba(255,255,255,.08);color:#bcc9c1;border-radius:9px;padding:6px 10px;font-weight:700;font-size:11.5px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.rolebar button.on{background:var(--pri);color:#fff}
.fabnotes{position:fixed;right:14px;bottom:14px;z-index:80;width:46px;height:46px;border-radius:50%;background:#14231b;color:#fff;border:0;font-weight:800;font-size:12px;cursor:pointer;box-shadow:0 12px 32px rgba(0,0,0,.35)}
@media(max-width:560px){.rolebar{left:8px;bottom:64px;transform:scale(.88);transform-origin:bottom left}.fabnotes{display:none}}

/* ---------- Responsive: มือถือ = แอป / คอม = เว็บเต็มจอ ---------- */
.cardgrid{display:flex;flex-direction:column;gap:10px}   /* มือถือ: ลิสต์แนวตั้ง */
.topnav{display:none}                                     /* โผล่เฉพาะจอคอม */
.iconbtn .cartn2{position:absolute;top:-5px;right:-5px;background:#e11d48;color:#fff;font-size:10px;min-width:17px;height:17px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff}

/* โหมดหน้าจอควบคุมด้วยคลาสที่ body — เพื่อให้กดสลับพรีวิวได้จากแถบ DEMO โดยไม่ต้อง deploy
   body.dt = เลย์เอาต์คอม · body.mb = เลย์เอาต์มือถือ · body.framed = ครอบกรอบเครื่องมือถือจำลอง
   (โหมด Auto: JS จะใส่ dt/mb ให้ตามขนาดหน้าต่างเอง เหมือน media query เดิม) */
body.dt .stage{background:var(--bg)}
body.dt .phone{width:100%;max-width:none;box-shadow:none}
body.dt .tabbar{display:none}
body.dt .m-only{display:none!important}
body.dt .topnav{display:block;position:sticky;top:0;z-index:45;background:rgba(255,255,255,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
body.dt .topnav-in{max-width:1128px;margin:0 auto;display:flex;align-items:center;flex-wrap:wrap;gap:10px 22px;padding:8px 24px;min-height:64px}
body.dt .tn-links{display:flex;gap:4px;flex:1}
body.dt .tn-link{border:0;background:none;padding:9px 16px;border-radius:12px;font:inherit;font-weight:700;font-size:14.5px;color:var(--mut);cursor:pointer}
body.dt .tn-link.on{background:var(--pri-soft);color:var(--pri-2)}
body.dt .appbar{position:static;background:none;backdrop-filter:none;max-width:1128px;margin:0 auto;padding:28px 24px 0}
body.dt .appbar.narrow{max-width:768px}
body.dt .page{max-width:1128px;margin:0 auto;padding:14px 24px 70px}
body.dt .page.narrow{max-width:768px}
body.dt .h1{font-size:26px}
body.dt .searchbox{max-width:560px}
body.dt .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;align-items:start}
body.dt .todo-scroll{flex-wrap:wrap;overflow:visible}
body.dt .todo-card{flex:1;min-width:260px;max-width:360px}
body.dt .seg{max-width:460px}
body.dt .chiprow{flex-wrap:wrap}

/* Console (Staff/อาจารย์/Admin) ในโหมดมือถือ */
body.mb .ctop-in{height:auto;flex-wrap:wrap;padding:10px 14px;gap:8px}
body.mb .ctabs{order:3;width:100%;overflow-x:auto;padding-bottom:4px}
body.mb .ctab{white-space:nowrap}
body.mb .cbody{padding:14px;padding-bottom:120px}

/* กรอบเครื่องมือถือจำลอง — เมื่อบังคับโหมดมือถือบนจอกว้าง */
body.framed .stage{padding:24px 0;min-height:100dvh}
body.framed .phone{width:min(414px,100vw);height:calc(100dvh - 48px);min-height:0;overflow-y:auto;border-radius:44px;border:11px solid #14231b;box-shadow:0 34px 90px rgba(10,25,16,.45);display:flex;flex-direction:column;scrollbar-width:none}
body.framed .phone::-webkit-scrollbar{display:none}
body.framed .page{flex:1;padding-bottom:28px}
body.framed .appbar{border-radius:33px 33px 0 0}
body.framed .tabbar{position:sticky;bottom:0;left:auto;transform:none;width:100%;margin-top:auto;border-radius:0 0 33px 33px}
body.framed .sheet{width:min(414px,96vw);margin-bottom:24px;border-radius:22px 22px 34px 34px}
body.framed .cshell{width:min(414px,100vw);margin:24px auto;height:calc(100dvh - 48px);min-height:0;overflow-y:auto;border-radius:44px;border:11px solid #14231b;box-shadow:0 34px 90px rgba(10,25,16,.45);scrollbar-width:none}
body.framed .cshell::-webkit-scrollbar{display:none}

@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes rise{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
.empty{padding:44px 20px;text-align:center;color:var(--mut)}

function tierBadge(t, small) {
  const cls = { 0:'b-green', 1:'b-green', 2:'b-amber', 3:'b-blue' }[t];
  return `<span class="badge ${cls}">${TIER[t].human}${small ? '' : ' · ' + TIER[t].code}</span>`;
}
function availText(it) {
  if (it.tier === 3) return `<span class="badge b-blue">${ic('cal',12)} ว่างวันนี้</span>`;
  if (it.tier === 2) {
    const free = it.serials.filter(s => s.free === 0).length;
    return free ? `<span class="badge b-green">พร้อมยืม ${free} เครื่อง</span>`
                : `<span class="badge b-amber">ว่างเร็วสุด ${fmtD(d(Math.min(...it.serials.filter(s=>s.free!=null).map(s=>s.free))))}</span>`;
  }
  if (it.stock > 0) return `<span class="badge b-green">พร้อมยืม ${it.stock} ${it.unit}</span>`;
  return `<span class="badge b-amber">ว่างเร็วสุด ${fmtD(d(it.nextFree || 2))}</span>`;
}
function stepper(status, tier) {
  const steps = tier === 3
    ? ['จองสำเร็จ', 'เช็คอิน', 'ใช้งาน', 'คืนพื้นที่']
    : ['ส่งคำขอ', 'อนุมัติ', 'รับของ', 'ใช้งาน', 'คืน & ตรวจ'];
  const cur = tier === 3
    ? { BOOKED:1, IN_USE:2, DONE:4 }[status] ?? 0
    : { PENDING:1, PREP:2, READY:2, IN_USE:3, INSPECT:4, DONE:5 }[status] ?? 0;
  return `<div class="stepper">${steps.map((t, i) => `
    <div class="stp ${i < cur ? 'done' : ''} ${i === cur ? 'cur' : ''}">
      <div class="d">${i < cur ? ic('check', 11, 3) : ''}</div>${t}
    </div>`).join('')}</div>`;
}

function buildTodos() {
  const out = [];
  myReqs().forEach(r => {
    const it = item(r.itemId);
    if (r.status === 'READY') out.push(todoCard('cart', 'b-blue', 'พร้อมรับของ',
      `${it.name} ×${r.qty}`, `รับที่ ${it.loc} · ภายใน ${fmtD(r.pickupBy)}`,
      `<button class="btn btn-pri btn-sm" onclick="A.openPickup('${r.id}')">ยืนยันรับของ</button>`));
    if (r.status === 'IN_USE' && !r.overdue) {
      const days = Math.ceil((r.due - Date.now()) / 864e5);
      if (days <= 2) out.push(todoCard('clock', days <= 1 ? 'b-amber' : 'b-gray',
        days <= 0 ? 'ครบกำหนดวันนี้' : days === 1 ? 'ครบกำหนดพรุ่งนี้' : `ครบกำหนดใน ${days} วัน`,
        it.name, `คืนก่อน 17:00 น. ที่ ${it.loc}`,
        `<button class="btn btn-pri btn-sm" onclick="A.openReturn('${r.id}')">คืนของ</button>
         <button class="btn btn-line btn-sm" onclick="A.openRenew('${r.id}')">ต่ออายุ</button>`));
    }
    if (r.status === 'PENDING') out.push(todoCard('doc', 'b-amber', 'รออาจารย์อนุมัติ',
      it.name, `ส่งคำขอแล้ว · โดยปกติทราบผลภายใน 1 วัน`,
      `<button class="btn btn-line btn-sm" onclick="A.go('mylist')">ติดตามสถานะ</button>`));
  });
  return out;
}
function todoCard(icon, badgeCls, badge, title, sub, actions) {
  return `<div class="card pad todo-card">
    <div class="row" style="margin-bottom:8px">
      <span class="badge ${badgeCls}">${badge}</span>

    <div class="h3">${title}</div>

    <div class="row">${actions}</div>
  </div>`;
}

/* ---------- Sheet: รายละเอียดอุปกรณ์ + ตั้งค่าคำขอยืม ---------- */
function itemSheet(sh) {
  const it = item(sh.itemId);
  const maxDays = creditLevel(DB.user.credit).days;   // เพดานวันตามเครดิต — ใช้เงียบๆ ไม่พูดถึงแต้ม
  if (it.tier === 3) return roomSheetBody(it);
  const canNow = it.tier === 2 ? it.serials.some(s => s.free === 0) : it.stock > 0;
  return `
  ${sheetHead(it.name, it.cat)}
  <div class="row" style="margin:10px 0 6px">
    <div class="thumb big">${ic(it.icon, 32, 1.7)}</div>
    <div class="vgap" style="gap:6px">${availText(it)}${tierBadge(it.tier)}</div>
  </div>
  <p class="sub" style="margin:10px 0 14px">${it.desc}</p>

  <div class="card pad" style="box-shadow:none;background:#fafbf9;margin-bottom:16px">
    <div class="kv"><span class="tiny">จุดรับ–คืนของ</span><b style="font-size:13px">${it.loc}</b></div>
    <div class="kv"><span class="tiny">ยืมได้ครั้งละ</span><b style="font-size:13px">สูงสุด ${maxDays} วัน · คืนก่อน 17:00 น.</b></div>
    <div class="kv"><span class="tiny">การอนุมัติ</span><b style="font-size:13px">${TIER[it.tier].approve}</b></div>
    ${it.tier === 1 ? `<div class="kv"><span class="tiny">การรับของ</span><b style="font-size:13px">เจ้าหน้าที่เลือกชิ้นที่พร้อมใช้ให้ · ขอเปลี่ยนได้ตอนรับ</b></div>` : ''}
  </div>

  ${it.tier === 2 ? serialPicker(it, sh) : `
  <div class="field"><span class="label">จำนวน</span>
    <div class="qty">
      <button onclick="A.sheetQty(-1)">−</button><b>${sh.qty}</b><button onclick="A.sheetQty(1)">+</button>
      <span class="tiny">จากที่ว่าง ${it.stock} ${it.unit}</span>
    </div>
  </div>`}

  <div class="field"><span class="label">ระยะเวลายืม</span>
    <div class="chiprow">${[1, 3, 5, 7, 14].filter(v => v <= maxDays).map(v =>
      `<button class="chip ${sh.days === v ? 'on' : ''}" onclick="A.sheetDays(${v})">${v} วัน</button>`).join('')}
    </div>
    <div class="tiny" style="margin-top:7px">${ic('cal', 12)} รับของ ${fmtD(d(it.tier === 2 ? 2 : 0))} → คืน ${fmtD(d((it.tier === 2 ? 2 : 0) + sh.days))} ก่อน 17:00 น.</div>
  </div>

  ${it.tier === 2 ? `<div class="notice info" style="margin-bottom:14px">${ic('info', 16)}
    คำขอนี้จะส่งให้อาจารย์ผู้ดูแลพิจารณา โดยปกติทราบผลภายใน 1 วัน — เราจะแจ้งเตือนทันทีที่มีผล</div>` : ''}
  ${!canNow ? `<div class="notice warn" style="margin-bottom:14px">${ic('clock', 16)}
    ตอนนี้ของถูกยืมครบทุกชิ้น สามารถ "จองคิวล่วงหน้า" ได้ — ระบบจะจัดคิวชิ้นที่ว่างเร็วที่สุดให้อัตโนมัติ</div>` : ''}

  <div class="row">
    <button class="btn btn-soft" style="flex:1" onclick="A.addCart('${it.id}')">${ic('cart', 17)} ใส่ตะกร้า</button>
    <button class="btn btn-pri" style="flex:1.4" onclick="A.borrowNow('${it.id}')">
      ${canNow ? 'ส่งคำขอยืม' : 'จองคิวล่วงหน้า'} ${ic('arrow', 17)}</button>
  </div>`;
}
function serialPicker(it, sh) {
  return `<div class="field"><span class="label">เลือกหมายเลขเครื่อง (Serial)</span>
    <div class="vgap" style="gap:8px">${it.serials.map(s => `
      <div class="serial ${sh.sn === s.sn ? 'on' : ''} ${s.free === null ? 'off' : ''}" onclick="A.sheetSn('${s.sn}')">

  return `

  <div class="page">

      `<button class="${S.listSeg === i ? 'on' : ''}" onclick="A.seg(${i})">${t}</button>`).join('')}</div>

  if (r.status === 'BOOKED') b.push(`<button class="btn btn-pri btn-sm" onclick="A.checkin('${r.id}')">${ic('camera', 15)} เช็คอิน + ถ่ายรูปก่อนใช้</button>`);
  if (r.status === 'IN_USE' && it.tier === 3) b.push(`<button class="btn btn-pri btn-sm" onclick="A.openReturn('${r.id}')">${ic('camera', 15)} คืนพื้นที่</button>`);
  if (r.status === 'IN_USE' && it.tier !== 3) {
    b.push(`<button class="btn btn-pri btn-sm" onclick="A.openReturn('${r.id}')">${ic('camera', 15)} คืนของ</button>`);
    b.push(`<button class="btn btn-line btn-sm" onclick="A.openRenew('${r.id}')">${ic('refresh', 15)} ต่ออายุ</button>`);
  }
  if (r.status === 'PENDING') b.push(`<button class="btn btn-line btn-sm" onclick="A.cancelReq('${r.id}')">ยกเลิกคำขอ</button>`);
  if (r.status === 'DONE' && r.damage) b.push(
    `<span class="badge b-amber">มีบันทึกความเสียหาย ${r.damage.lv}</span>
     <button class="btn btn-line btn-sm" onclick="A.openAppeal('${r.id}')">ยื่นอุทธรณ์</button>`);
  return b.length ? `<div class="row" style="flex-wrap:wrap;gap:8px;margin-top:10px">${b.join('')}</div>` : '';
}

function consoleCounts() {
  if (S.role === 'staff') return [
    DB.reqs.filter(r => r.status === 'PREP').length + DB.reqs.filter(r => r.overdue && r.status === 'IN_USE').length,
    DB.reqs.filter(r => r.status === 'INSPECT').length, 0];
  if (S.role === 'supervisor') return [
    DB.reqs.filter(r => r.status === 'PENDING').length,
    DB.appeals.filter(a => a.status === 'PENDING').length];
  return [0, 0, 0];
}

/* ---------- Staff: งานวันนี้ ---------- */
function staffToday() {
  const prep = DB.reqs.filter(r => r.status === 'PREP');
  const ready = DB.reqs.filter(r => r.status === 'READY');
  const overdue = DB.reqs.filter(r => r.overdue && r.status === 'IN_USE');
  const stat = (n, t, c) => `<div class="card pad stat"><div class="n" style="color:${c}">${n}</div><div class="tiny">${t}</div></div>`;
  return `
  <div class="grid4">
    ${stat(prep.length, 'รอเตรียมของ', 'var(--blue)')}
    ${stat(ready.length, 'นัดรับของวันนี้', 'var(--pri)')}
    ${stat(DB.reqs.filter(r => r.status === 'INSPECT').length, 'รอตรวจสภาพ', 'var(--amber)')}
    ${stat(overdue.length, 'เกินกำหนด', 'var(--red)')}
  </div>
  <div class="grid2">
    <div class="card pad">
      <div class="sec-head"><h3 class="h2">คิวเตรียมของ</h3><span class="badge b-blue">${prep.length} รายการ</span></div>
      <div class="vgap">${prep.length ? prep.map(r => {
        const it = item(r.itemId);
        return `<div class="card pad" style="box-shadow:none;background:#fafbf9">
          <div class="row" style="justify-content:space-between">
            <div><b>${it.name}</b> ×${r.qty}<div class="tiny">${r.id} · ผู้ยืม: ${r.owner} · รับ ${fmtD(r.start)}</div></div>
            <button class="btn btn-pri btn-sm" onclick="A.staffPrep('${r.id}')">${ic('scan', 14)} เลือกชิ้น + พร้อมส่งมอบ</button>
          </div></div>`;
      }).join('') : '<p class="tiny">ไม่มีคิวค้าง 🎉</p>'}</div>
    </div>
    <div class="card pad">
      <div class="sec-head"><h3 class="h2">นัดรับของ / เกินกำหนด</h3></div>
      <div class="vgap">
        ${ready.map(r => {
          const it = item(r.itemId);
          return `<div class="row" style="justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line)">
            <div><b>${it.name}</b> ×${r.qty} — ${r.owner === 'me' ? DB.user.name : r.owner}
              <div class="tiny">${r.id} · ${r.sn} · รับภายใน ${fmtD(r.pickupBy || r.start)} มิฉะนั้นระบบยกเลิกอัตโนมัติ</div></div>
            <span class="badge b-blue">รอผู้ยืมกดยืนยัน</span></div>`;
        }).join('')}
        ${overdue.map(r => {
          const it = item(r.itemId);
          return `<div class="row" style="justify-content:space-between;padding:6px 0">
            <div><b>${it.name}</b> — ${r.owner}
              <div class="tiny">${r.id} · เกินกำหนด ${Math.ceil((Date.now() - r.due) / 864e5)} วัน (ครบ ${fmtD(r.due)})</div></div>
            <button class="btn btn-line btn-sm" onclick="A.toast('ส่งอีเมล + แจ้งเตือนในแอปถึงผู้ยืมแล้ว')">${ic('bell', 14)} แจ้งเตือน</button></div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

/* ---------- Sheet: ประเมินสภาพ (Staff) ---------- */
function assessSheet(sh) {
  const r = DB.reqs.find(x => x.id === sh.reqId), it = item(r.itemId);
  const w = TIER[it.tier].credit;
  const sel = sh.dmg ?? 'B0';
  const dm = DMG.find(x => x.lv === sel);
  const dis = w * dm.w;
  return `
  ${sheetHead('ประเมินสภาพของคืน', `${it.name} · ${r.sn} · ${r.id}`)}
  <div class="photo-cmp" style="margin:12px 0">
    <div class="ph">${ic('image', 20)}<br>รูปตอนรับ</div>
    <div class="ph">${ic('image', 20)}<br>รูปตอนคืน</div>
  </div>
  <div class="field"><span class="label">ระดับความเสียหาย</span>
    <div class="vgap" style="gap:8px">${DMG.map(x => `
      <div class="serial ${sel === x.lv ? 'on' : ''}" onclick="A.pickDmg('${x.lv}')">
        <b style="min-width:26px">${x.lv}</b>
        <div style="flex:1;font-size:13.5px">${x.name}</div>
        <span class="tiny">น้ำหนัก ${x.w}</span>
      </div>`).join('')}</div>
  </div>
  <div class="card pad" style="box-shadow:none;background:#fafbf9;margin-bottom:14px">
    <div class="kv"><span class="tiny">discredit = เครดิตอุปกรณ์ (${w}) × น้ำหนัก (${dm.w})</span><b style="color:${dis ? 'var(--red)' : 'var(--pri)'}">${dis ? '−' + dis + ' คะแนน' : 'ไม่หักคะแนน'}</b></div>
    ${dis ? `<div class="kv"><span class="tiny">อายุบทลงโทษ (discredit × 2)</span><b>${dis * 2} วัน</b></div>` : ''}
    <div class="tiny" style="margin-top:4px">${ic('info', 12)} ผลจะบันทึกเข้าประวัติหมายเลข ${r.sn} และแจ้งผู้ยืมพร้อมสิทธิ์อุทธรณ์</div>
  </div>
  <button class="btn btn-pri btn-block" onclick="A.confirmAssess('${r.id}')">บันทึกผลตรวจ + ปิดรายการ ${ic('check', 16)}</button>`;
}

/* ---------- Supervisor: คำขอรออนุมัติ ---------- */
function supApprovals() {
  const q = DB.reqs.filter(r => r.status === 'PENDING');
  return `
  <div class="notice info">${ic('shield', 17)} ผู้อนุมัติต้องไม่ใช่ผู้ขอ — ทุกการตัดสินใจถูกบันทึกใน Audit Log อัตโนมัติ</div>
  <div class="grid2">
    ${q.length ? q.map(r => {
      const it = item(r.itemId);
      const isMe = r.owner === 'me';
      const credit = isMe ? DB.user.credit : (r.ownerCredit ?? 88);
      const lv = creditLevel(credit);
      const sn = it.serials?.find(s => s.sn === r.sn);
      return `<div class="card pad">
        <div class="row" style="justify-content:space-between;margin-bottom:8px">
          <b>${r.id}</b>
          <span class="badge ${r.lowCredit ? 'b-amber' : 'b-blue'}">${r.lowCredit ? 'เครดิตต่ำ ยืม T1 — ต้องอาจารย์อนุมัติ' : 'อุปกรณ์มูลค่าสูง (T2)'}</span>
        </div>
        <div class="row" style="margin-bottom:10px"><div class="thumb">${ic(it.icon, 22, 1.8)}</div>
          <div><b>${it.name}</b>${r.sn ? ` · ${r.sn}` : ''} ×${r.qty}
            <div class="tiny">${fmtD(r.start)} – ${fmtD(r.due)} (${Math.round((r.due - r.start) / 864e5)} วัน)</div></div></div>
        <div class="card pad" style="box-shadow:none;background:#fafbf9;margin-bottom:12px">
          <div class="kv"><span class="tiny">ผู้ขอ</span><b>${isMe ? DB.user.name : r.owner}</b></div>
          <div class="kv"><span class="tiny">เครดิต</span><b>${credit}/100 · ${lv.name} (${lv.lv})</b></div>
          <div class="kv"><span class="tiny">ประวัติผู้ขอ</span><b>ยืม 12 ครั้ง · คืนช้า 1 · เสียหาย ${isMe ? '1 (B1 อยู่ระหว่างอุทธรณ์)' : '0'}</b></div>

        </div>
      </div>`;
    }).join('') : '<div class="card pad empty">ไม่มีคำขอค้างพิจารณา 🎉</div>'}
  </div>`;
}

      ${[['แจ้งเตือนก่อนครบกำหนดคืน (อีเมล + ในแอป)', true], ['แจ้งเตือนคำขอค้างพิจารณาถึงอาจารย์', true], ['สรุปรายงานรายสัปดาห์ถึง Staff', false]]
        .map(([t, on]) => `<div class="row" style="justify-content:space-between;padding:6px 0">
          <span style="font-size:13.5px">${t}</span><button class="switch ${on ? 'on' : ''}" onclick="this.classList.toggle('on')"></button></div>`).join('')}
      <button class="btn btn-pri btn-block" style="margin-top:14px" onclick="A.toast('บันทึกการตั้งค่าแล้ว · มีผลกับคำขอใหม่ทันที')">บันทึกการตั้งค่า</button>
    </div>
  </div>`;
}

/* ---------- Sheet: UX Design Notes ---------- */
function notesSheet() {
  const li = (t, s) => `<div style="margin-bottom:11px"><b style="font-size:13.5px">• ${t}</b><div class="tiny" style="margin-left:12px">${s}</div></div>`;
  return `
  ${sheetHead('บันทึกแนวคิดการออกแบบ (UX Notes)')}
  <div style="margin-top:6px">
    ${li('Borrower-first / Mobile-first', 'ผู้ยืมต้องถ่ายรูปตอนรับ–คืนด้วยมือถืออยู่แล้ว หน้าจอผู้ยืมจึงเป็นแอปมือถือ ส่วน Staff/อาจารย์/Admin ใช้ console จอใหญ่')}
    ${li('ซ่อนเรื่องแต้มไว้ในโปรไฟล์', 'ใน flow ยืม–คืนไม่มีการโชว์คะแนน ระบบใช้เครดิตคำนวณเงียบ ๆ แล้วแสดงแค่ผลลัพธ์ เช่น "ยืมได้สูงสุด 14 วัน" — ไม่ทำให้ผู้ใช้รู้สึกถูกจับผิด')}
    ${li('แปลง Tier เป็นภาษาคน', 'ไม่โชว์ศัพท์ T0–T3 นำ แต่บอกผลที่ผู้ใช้เจอ: "ยืมได้ทันที" / "ต้องขออนุมัติอาจารย์" / "จองเป็นรอบเวลา"')}
    ${li('หน้าแรก = สิ่งที่ต้องทำ ไม่ใช่เมนู', 'การ์ด "รับของ / คืนพรุ่งนี้ / รออนุมัติ" ขึ้นก่อนเสมอ ลดของหลุดคืนช้าโดยไม่ต้องขู่ผู้ใช้')}
    ${li('ถ่ายรูป = การปกป้องผู้ยืม', 'ตีความการถ่ายรูปว่าเป็น "หลักฐานฝั่งคุณ" เปลี่ยนงานที่น่ารำคาญให้เป็นประโยชน์กับผู้ใช้เอง')}
    ${li('แต่ละรายการเดินสถานะแยกกัน', 'ยืมหลายชิ้นในคำขอเดียวได้ (ตะกร้า) แต่ชิ้นที่อนุมัติอัตโนมัติไม่ต้องรอชิ้นที่รออาจารย์')}
    ${li('ความโปร่งใสสองทาง', 'ผลตรวจสภาพแนบรูปเทียบก่อน–หลัง + อุทธรณ์ได้เสมอ ผู้ตัดสินไม่ใช่ผู้ประเมิน (แสดงในหน้าจออาจารย์)')}
    ${li('เดโมครบวงจร', 'ใช้แถบสลับบทบาทซ้ายล่าง: ผู้ยืมส่งคำขอ T2 → อาจารย์อนุมัติ → Staff เตรียมของ → ผู้ยืมรับ/คืน → Staff ตรวจสภาพ → ผู้ยืมอุทธรณ์ → อาจารย์ตัดสิน')}
    ${li('พรีวิวมือถือได้โดยไม่ต้อง deploy', 'แถบ DEMO เลือก "หน้าจอ: มือถือ" เพื่อจำลองหน้าจอโทรศัพท์พร้อมกรอบเครื่องบนคอม หรือ "คอม" เพื่อดูเลย์เอาต์เดสก์ท็อป — โหมด Auto จะสลับตามขนาดหน้าต่างจริงเหมือนตอนใช้งาน')}
  </div>`;
}

/* ================= Demo bars ================= */
function demoBars() {
  const roles = [['student', 'ผู้ยืม'], ['staff', 'Staff'], ['supervisor', 'อาจารย์'], ['admin', 'Admin']];
  const devs = [['auto', 'Auto', ''], ['mobile', 'มือถือ', 'mobile'], ['desktop', 'คอม', 'monitor']];
  return `
  <div class="rolebar">
    <div class="rb-row"><span>บทบาท</span>
      ${roles.map(([r, t]) => `<button class="${S.role === r ? 'on' : ''}" onclick="A.setRole('${r}')">${t}</button>`).join('')}</div>
    <div class="rb-row"><span>หน้าจอ</span>
      ${devs.map(([v, t, i]) => `<button class="${S.device === v ? 'on' : ''}" onclick="A.setDevice('${v}')">${i ? ic(i, 13) : ''}${t}</button>`).join('')}</div>
  </div>
  <button class="fabnotes" onclick="A.openNotes()" title="แนวคิดการออกแบบ">UX</button>`;
}
/* โหมดหน้าจอ: auto = ตามขนาดหน้าต่างจริง / mobile / desktop = บังคับเพื่อพรีวิว
   framed = บังคับมือถือบนจอกว้าง → ครอบกรอบเครื่องจำลองให้เหมือนเทสบนโทรศัพท์ */
function applyDevice() {
  const wide = window.innerWidth >= 900;
  const mode = S.device === 'auto' ? (wide ? 'desktop' : 'mobile') : S.device;
  document.body.classList.toggle('dt', mode === 'desktop');
  document.body.classList.toggle('mb', mode === 'mobile');
  document.body.classList.toggle('framed', mode === 'mobile' && wide);
}

/* ================= Actions ================= */
const A = {
  login()  { S.logged = true; render(); },
  logout() { S.logged = false; S.role = 'student'; render(); },
  setRole(r) { S.role = r; S.ctab = 0; S.sheet = null; render(); },
  setDevice(v) {
    S.device = v; applyDevice(); render();
    A.toast(v === 'auto' ? 'ปรับตามขนาดหน้าต่างอัตโนมัติ'
      : v === 'mobile' ? 'พรีวิวหน้าจอมือถือ — ลองกดใช้งานได้เหมือนบนโทรศัพท์'
      : 'พรีวิวหน้าจอคอม', v === 'mobile' ? 'mobile' : v === 'desktop' ? 'monitor' : 'refresh');
  },
  go(r)    { S.route = r; S.sheet = null; render(); window.scrollTo(0, 0); },
  ctab(i)  { S.ctab = i; render(); },
  seg(i)   { S.listSeg = i; render(); },
  goSearch() { S.route = 'browse'; S._focusQ = true; render(); document.getElementById('q')?.focus(); },
  pickCat(c) { S.cat = c; S.route = 'browse'; render(); },
  setCat(c)  { S.cat = c; render(); },
  search(v)  { S.q = v; render(); const el = document.getElementById('q'); if (el) { el.focus(); el.setSelectionRange(v.length, v.length); } },

  /* ----- sheets ----- */
  openItem(id) {
    const it = item(id);
    S.sheet = { type: 'item', itemId: id, qty: 1, days: Math.min(7, creditLevel(DB.user.credit).days), sn: it.serials?.find(s => s.free === 0)?.sn || null, day: 0, slots: [] };
    renderSheet();
  },
  closeSheet() { S.sheet = null; renderSheet(); },
  sheetQty(v) { const it = item(S.sheet.itemId); S.sheet.qty = Math.max(1, Math.min((it.stock || 1), S.sheet.qty + v)); renderSheet(); },
  sheetDays(v) { S.sheet.days = v; renderSheet(); },
  sheetSn(sn) { S.sheet.sn = sn; renderSheet(); },
  sheetDay(i) { S.sheet.day = i; S.sheet.slots = []; renderSheet(); },
  sheetSlot(t) {
    const sl = S.sheet.slots;
    if (sl.includes(t)) S.sheet.slots = sl.filter(x => x !== t);
    else if (sl.length >= 2) return A.toast('จองได้สูงสุด 2 ช่วงเวลาต่อครั้ง');
    else sl.push(t);
    renderSheet();
  },
  snap(k) { S.snaps[k] = !S.snaps[k]; renderSheet(); },

  /* ----- ยืม / ตะกร้า ----- */
  addCart(id) {
    const sh = S.sheet;
    S.cart.push({ itemId: id, qty: sh.qty, sn: sh.sn, days: sh.days });
    S.sheet = null; render();
    A.toast('ใส่ตะกร้าแล้ว — เลือกชิ้นอื่นต่อได้เลย', 'cart');
  },
  borrowNow(id) {
    const sh = S.sheet, it = item(id);
    const auto = it.tier < 2;
    DB.reqs.unshift({
      id: 'R-' + Math.floor(2900 + Math.random() * 90), itemId: id, owner: 'me',
      qty: sh.qty, sn: it.tier === 2 ? sh.sn : null,
      status: auto ? 'PREP' : 'PENDING',
      start: d(it.tier === 2 ? 2 : 0), due: d((it.tier === 2 ? 2 : 0) + sh.days),
      pickupBy: d(1), renewLeft: 1, photos: { recv: false, ret: false },
    });
    S.sheet = null; S.route = 'mylist'; S.listSeg = 0; render();
    A.toast(auto ? 'อนุมัติแล้ว! เจ้าหน้าที่กำลังเตรียมของ' : 'ส่งคำขอแล้ว — รออาจารย์พิจารณา (ปกติภายใน 1 วัน)', 'check');
  },
  rmCart(i) { S.cart.splice(i, 1); render(); },
  submitCart() {
    const auto = S.cart.filter(c => item(c.itemId).tier < 2).length;
    S.cart.forEach(c => {
      const it = item(c.itemId);
      DB.reqs.unshift({
        id: 'R-' + Math.floor(2900 + Math.random() * 90), itemId: c.itemId, owner: 'me',
        qty: c.qty, sn: it.tier === 2 ? c.sn : null,
        status: it.tier < 2 ? 'PREP' : 'PENDING',
        start: d(it.tier === 2 ? 2 : 0), due: d((it.tier === 2 ? 2 : 0) + c.days),
        pickupBy: d(1), renewLeft: 1, photos: { recv: false, ret: false },
      });
    });
    const sup = S.cart.length - auto;
    S.cart = []; S.route = 'mylist'; S.listSeg = 0; render();
    A.toast(`ส่งคำขอแล้ว · อนุมัติทันที ${auto} รายการ${sup ? ` · รออาจารย์ ${sup} รายการ` : ''}`, 'check');
  },
  submitBooking(id) {
    const sh = S.sheet;
    if (!sh.slots.length) return A.toast('เลือกช่วงเวลาอย่างน้อย 1 ช่วงก่อนนะ');
    DB.reqs.unshift({
      id: 'B-' + Math.floor(700 + Math.random() * 90), itemId: id, owner: 'me', qty: 1,
      slots: [...sh.slots].sort(), status: 'BOOKED',
      start: d(sh.day), due: d(sh.day), renewLeft: 1, photos: { recv: false, ret: false },
    });
    S.sheet = null; S.route = 'mylist'; S.listSeg = 0; render();
    A.toast('จองสำเร็จ! ระบบกันคิวให้แล้ว', 'check');
  },

  /* ----- รับ / คืน / ต่ออายุ ----- */
  openPickup(id) { S.sheet = { type: 'pickup', reqId: id }; renderSheet(); },
  confirmPickup(id) {
    const r = DB.reqs.find(x => x.id === id);
    r.status = 'IN_USE'; r.photos.recv = true;
    S.sheet = null; S.route = 'mylist'; S.listSeg = 1; render();
    A.toast(`เริ่มนับเวลายืมแล้ว · คืนภายใน ${fmtD(r.due)} ก่อน 17:00 น.`, 'check');
  },
  checkin(id) {
    const r = DB.reqs.find(x => x.id === id);
    r.status = 'IN_USE'; r.photos.recv = true; render();
    A.toast('เช็คอินแล้ว ใช้งานได้เลย', 'check');
  },
  openReturn(id) { S.sheet = { type: 'ret', reqId: id }; renderSheet(); },
  confirmReturn(id) {
    const r = DB.reqs.find(x => x.id === id), it = item(r.itemId);
    r.photos.ret = true;
    r.status = it.tier === 3 ? 'DONE' : 'INSPECT';
    S.sheet = { type: 'retDone' }; render();
  },
  openRenew(id) { S.sheet = { type: 'renew', reqId: id }; renderSheet(); },
  doRenew(id, mode) {
    const r = DB.reqs.find(x => x.id === id);
    if (mode === 'online') { r.renewLeft--; r.due = new Date(+r.due + 7 * 864e5); r.overdue = false; }
    S.sheet = null; render();
    A.toast(mode === 'online' ? `ต่ออายุแล้ว · กำหนดคืนใหม่ ${fmtD(r.due)}` : 'ส่งคำขอต่ออายุถึงอาจารย์แล้ว', 'check');
  },
  cancelReq(id) {
    DB.reqs = DB.reqs.filter(x => x.id !== id); render();
    A.toast('ยกเลิกคำขอแล้ว · คิวถูกคืนให้ผู้อื่นทันที');
  },
  openNotif() { DB.notifs.forEach(n => n.unread = false); S.sheet = { type: 'notif' }; render(); },
  openNotes() { S.sheet = { type: 'notes' }; renderSheet(); },

  /* ----- อุทธรณ์ ----- */
  openAppeal(id) { S.sheet = { type: 'appeal', reqId: id }; renderSheet(); },
  submitAppeal(id) {
    const reason = document.getElementById('appeal-reason')?.value || '(ไม่ระบุ)';
    DB.appeals.unshift({
      id: 'AP-' + Math.floor(110 + Math.random() * 80), reqId: id, status: 'PENDING',
      created: d(0), reason, staffLv: DB.reqs.find(x => x.id === id)?.damage?.lv || 'B1',
    });
    S.sheet = null; render();
    A.toast('ส่งคำอุทธรณ์แล้ว — ติดตามผลได้ในโปรไฟล์', 'check');
  },

  /* ----- Staff ----- */
  staffPrep(id) {
    const r = DB.reqs.find(x => x.id === id);
    r.status = 'READY'; r.sn = r.sn || 'AR-0' + (2 + Math.floor(Math.random() * 6)); r.pickupBy = d(1);
    render(); A.toast(`บันทึกแล้ว · แจ้งผู้ยืมมารับ ${r.sn} ภายใน ${fmtD(r.pickupBy)}`, 'check');
  },
  openAssess(id) { S.sheet = { type: 'assess', reqId: id, dmg: 'B0' }; renderSheet(); },
  pickDmg(lv) { S.sheet.dmg = lv; renderSheet(); },
  confirmAssess(id) {
    const r = DB.reqs.find(x => x.id === id), it = item(r.itemId);
    const dm = DMG.find(x => x.lv === S.sheet.dmg);
    const dis = TIER[it.tier].credit * dm.w;
    r.status = 'DONE';
    if (dis > 0) {
      r.damage = { lv: dm.lv, discredit: dis };
      if (r.owner === 'me') {
        DB.user.credit = Math.max(0, DB.user.credit - dis);
        DB.creditLog.unshift({ at: d(0), txt: `ผลประเมินความเสียหาย ${dm.lv} · ${it.name} (${r.id})`, v: -dis });
        DB.notifs.unshift({ at: d(0), icon: 'shield', txt: `ผลตรวจสภาพ ${r.id}: ${dm.lv} — ยื่นอุทธรณ์ได้ในโปรไฟล์`, unread: true });
      }
    }
    S.sheet = null; render();
    A.toast(dis ? `บันทึกผล ${dm.lv} · หัก ${dis} คะแนน · แจ้งผู้ยืมพร้อมสิทธิ์อุทธรณ์แล้ว` : 'ปิดรายการเรียบร้อย · สภาพปกติ', 'check');
  },
  openAddItem() { S.sheet = { type: 'addItem' }; renderSheet(); },

  /* ----- Supervisor ----- */
  supApprove(id) {
    const r = DB.reqs.find(x => x.id === id);
    r.status = 'PREP';
    if (r.owner === 'me') DB.notifs.unshift({ at: d(0), icon: 'check', txt: `คำขอ ${r.id} ได้รับอนุมัติแล้ว — เจ้าหน้าที่กำลังเตรียมของ`, unread: true });
    render(); A.toast('อนุมัติแล้ว · ส่งต่อคิวเตรียมของให้ Staff · บันทึก Audit Log', 'check');
  },
  supReject(id) {
    const r = DB.reqs.find(x => x.id === id);
    r.status = 'REJECTED'; r.reason = 'ช่วงเวลาที่ขอชนกับการเรียนการสอน';
    if (r.owner === 'me') DB.notifs.unshift({ at: d(0), icon: 'x', txt: `คำขอ ${r.id} ไม่ได้รับอนุมัติ — ปรับช่วงเวลาแล้วส่งใหม่ได้`, unread: true });
    render(); A.toast('บันทึกการปฏิเสธพร้อมเหตุผล · ผู้ยืมส่งคำขอใหม่ได้');
  },
  supAppealDecide(id, ok) {
    const a = DB.appeals.find(x => x.id === id);
    a.status = ok ? 'APPROVED' : 'DENIED';
    const r = DB.reqs.find(x => x.id === a.reqId);
    if (ok && r?.owner === 'me' && r.damage) {
      DB.user.credit = Math.min(100, DB.user.credit + r.damage.discredit);
      DB.creditLog.unshift({ at: d(0), txt: `อุทธรณ์ ${a.id} ผ่าน · คืนคะแนน (${item(r.itemId).name})`, v: +r.damage.discredit });
      DB.notifs.unshift({ at: d(0), icon: 'check', txt: `อุทธรณ์ ${a.id} ได้รับการอนุมัติ · ปรับผลเป็น B0 และคืนคะแนนแล้ว`, unread: true });
      r.damage = null;
    }
    render(); A.toast(ok ? 'รับอุทธรณ์ · ปรับผลและคืนคะแนนให้ผู้ยืมแล้ว' : 'ยืนผลประเมินเดิม · แจ้งผู้ยืมแล้ว', 'check');
  },

  /* ----- Toast ----- */
  toast(msg, icon) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `${ic(icon || 'info', 17)}<span>${msg}</span>`;
    document.getElementById('toast-root').appendChild(t);
    setTimeout(() => { t.style.transition = 'opacity .3s'; t.style.opacity = 0; setTimeout(() => t.remove(), 320); }, 2600);
  },
};

window.addEventListener('resize', applyDevice);
applyDevice();
render();
</script>
</body>
